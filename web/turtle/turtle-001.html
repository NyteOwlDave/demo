<script>
function perform( event ) {
    const str =( s )=> ( String( s || "" ).trim() );
    try {
        let js;
        const ge = event.target;
        switch ( ge.nodeName ) {
        case "INPUT" : case "TEXTAREA" :
            js = ge.value;
            break;
        case "CODE" : case "PRE" :
            js = ge.innerText;
            break;
        default :
            throw new TypeError( `Wrong gadget type` );
        }
        if (! str( js ) ) { return; };
        exec( js );
    } catch( e ) {
        crashed( e );
    }
}
</script>

<script>
function exec( js ) {
    const str =( s )=> ( String( s || "" ).trim() );
    try {
        const cmd = str( js );
        if (! cmd ) { return; }
        if ( macro( cmd ) ) { return; }
        exec . prior = String( exec . input || "" );
        exec . input = String( js );
        exec . error = ( "" );
        exec . output = window.eval( exec . input );
        return ( exec . output );
    } catch( e ) {
        console . error( e );
        exec . error = ( e.message );
        exec . output =  ( "" );
        return ( e );
    }
}
</script>
